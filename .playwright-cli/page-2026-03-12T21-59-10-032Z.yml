- article [ref=e2]:
  - 'heading "cortex: Call workspace/create RPC instead of /api/ready for bootstrap" [level=1] [ref=e3]'
  - generic [ref=e4]: ✅ All 9 chunks across 5 files are present
  - paragraph [ref=e5]:
    - text: Today, when cortex needs to bootstrap a sandbox (set up git repos, agent templates, plugins, credentials), it sends a flat bag of environment variables to sboxd's
    - code [ref=e6]: /api/ready
    - text: HTTP endpoint. This is untyped, only runs for reused sandboxes, and requires nimbus as a middleman for newly provisioned ones.
  - paragraph [ref=e7]:
    - text: "This change introduces an alternative path: cortex calls sboxd's"
    - code [ref=e8]: workspace/create
    - text: WebSocket RPC with a structured
    - code [ref=e9]: BootstrapConfig
    - text: . A Statsig feature flag (
    - code [ref=e10]: cortex_workspace_create_bootstrap
    - text: ) switches between the two paths, so we can roll out incrementally. The old /api/ready path is preserved as the default fallback.
  - 'heading "1. New types: BootstrapConfig on the wire protocol" [level=2] [ref=e11]'
  - paragraph [ref=e12]:
    - text: The Go sboxd proto already defines
    - code [ref=e13]: BootstrapConfig
    - text: and
    - code [ref=e14]: GitConfig
    - text: (added in a prior sboxd PR). The TypeScript stream-protocol types need to mirror them so the TS client can send them over the wire.
  - paragraph [ref=e15]:
    - code [ref=e16]: GitConfig
    - text: holds ugit server credentials.
    - code [ref=e17]: BootstrapConfig
    - text: "carries everything sboxd needs to set up a workspace: which workload to run, who owns it, git access, and an opaque"
    - code [ref=e18]: env
    - text: map for feature flags that sboxd passes through to foundry controller hooks.
  - paragraph [ref=e19]:
    - text: The key addition is
    - code [ref=e20]: "bootstrap?: BootstrapConfig"
    - text: "on"
    - code [ref=e21]: WorkspaceCreateRequest
    - text: . When present, sboxd runs bootstrap inline after creating the workspace directory. When absent, the existing behavior (create an empty directory) is unchanged.
