  - code [ref=e470]: "## 4. Feature-flag switchover at the call site The original code in `ensureSandbox()` only called `reconcileSboxdReady()` for reused sandboxes (not newly provisioned, not from warm pool). The new path widens this: when the `cortex_workspace_create_bootstrap` gate is on, `bootstrapViaWorkspaceCreate()` runs for ALL workload-configured sandboxes (new, warm, reused) since bootstrap is idempotent. When the gate is off, the `else if` branch preserves the old behavior exactly. Note the outer condition also adds a `context.fileId` check. The old code checked `workloadConfig && rewrittenSboxdUrl`; the new code adds `context.fileId` because the bootstrap config requires it (workload owner ID, git username). This is safe because `sandboxEnvVars()` already gates its workload block on `context.fileId`. <!-- DIFF_PLACEHOLDER_3 --> `sandboxEnvVars()` and the nimbus call above this block are untouched. Env vars still flow to nimbus so that old cortex instances (during rollout) and nimbus's own /api/ready calls keep working. That gets cleaned up in a later PR once all instances are on the new path. ## 5. Wiring: gate registration, imports, and dependency The new Statsig gate `cortex_workspace_create_bootstrap` is registered in the gates array. This is what `CortexStatsig.checkGate()` validates against at compile time, so adding the string here is required before it can be referenced in code. <!-- DIFF_PLACEHOLDER_4 --> The new imports bring in `AgentPlatClient` (the WebSocket client for sboxd RPCs), `DEFAULT_WORKSPACE_ID` and `DEFAULT_WORKSPACE_PATH` (well-known constants for the default workspace), and the `BootstrapConfig` type. <!-- DIFF_PLACEHOLDER_5 --> Cortex already depended on `@figma/agentplat-stream-protocol` for types. This adds `@figma/agentplat-client` for the WebSocket client class. Both are workspace-linked monorepo packages. <!-- DIFF_PLACEHOLDER_6 -->"